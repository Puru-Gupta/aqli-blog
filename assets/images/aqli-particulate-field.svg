<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AQLI particulate field</title>
  <desc id="desc">Abstract air quality measurement points over a subtle map grid using maroon, gold, green, teal, and blue.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.42" stop-color="#f5fcff"/>
      <stop offset="1" stop-color="#eef4ef"/>
    </linearGradient>
    <radialGradient id="hot" cx="28%" cy="44%" r="55%">
      <stop offset="0" stop-color="#f8a429" stop-opacity="0.55"/>
      <stop offset="0.34" stop-color="#c16622" stop-opacity="0.35"/>
      <stop offset="0.64" stop-color="#8f3931" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8f3931" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="76%" cy="35%" r="52%">
      <stop offset="0" stop-color="#5b96ad" stop-opacity="0.36"/>
      <stop offset="0.5" stop-color="#155f83" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#155f83" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1c2b39" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
